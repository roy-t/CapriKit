name: Unit Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/badges/unit-tests.json
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run unit tests
    permissions:
      contents: write
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          global-json-file: global.json

      - name: Run unit tests
        shell: pwsh
        run: dotnet test --results-directory .build/tst --report-trx --report-trx-filename unit-tests.trx

      - name: Update test badge
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $badgePath = '.github/badges/unit-tests.json'
          New-Item -ItemType Directory -Force -Path (Split-Path $badgePath) | Out-Null

          $trxPath = '.build/tst/unit-tests.trx'
          if (Test-Path $trxPath) {
            [xml]$trx = Get-Content $trxPath
            $counters = $trx.TestRun.ResultSummary.Counters
            $total = [int]$counters.total
            $passed = [int]$counters.passed
            $failed = [int]$counters.failed
            $notExecuted = [int]$counters.notExecuted

            $message = if ($failed -eq 0) { "$passed/$total passed" } else { "$passed/$total passed, $failed failed" }
            $color = if ($failed -eq 0 -and $notExecuted -eq 0) { 'brightgreen' } else { 'red' }
          } else {
            $message = 'no results'
            $color = 'lightgrey'
          }

          @{
            schemaVersion = 1
            label = 'tests'
            message = $message
            color = $color
          } | ConvertTo-Json | Set-Content $badgePath

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add $badgePath
          git diff --cached --quiet
          switch ($LASTEXITCODE) {
            0 { }
            1 {
              git commit -m 'Update unit test badge'
              git push
            }
            default {
              exit $LASTEXITCODE
            }
          }
